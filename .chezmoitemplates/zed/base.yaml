# Base settings for Zed
colorize_brackets: true
vim:
  use_system_clipboard: "always"
vim_mode: true
ui_font_size: 16
buffer_font_size: 15
tab_size: 2
buffer_font_family: "CaskaydiaCove Nerd Font Mono"
file_types:
  JSONC:
    - "*.json.tmpl"
    - "**/zed-settings"
    - "**/zed-keymap"
    - "**/zed-tasks"
